<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<style>
  html, body { margin: 0; padding: 0; }
  .banner {
    width: 1600px; height: 400px; background: #161616;
    position: relative; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  .glow {
    position: absolute; inset: 0;
    background: radial-gradient(900px 460px at 22% 45%, rgba(86, 129, 181, 0.16), transparent 65%);
  }
  .mark { position: absolute; left: 100px; top: 50%; transform: translateY(-50%); }
  .text { position: absolute; left: 318px; top: 50%; transform: translateY(-52%); }
  h1 { margin: 0; font-size: 108px; font-weight: 700; letter-spacing: -0.035em; color: #edf1f6; }
  p {
    margin: 12px 0 0 4px;
    font: 500 27px/1 ui-monospace, "SF Mono", SFMono-Regular, Menlo, monospace;
    color: #7fb0dc;
  }
  /* board-corner motif: rounded checker squares fading off the right edge */
  .board {
    position: absolute; right: -36px; top: 50%; transform: translateY(-50%) rotate(-8deg);
    display: grid; grid-template-columns: repeat(5, 88px); grid-auto-rows: 88px; gap: 14px;
  }
  .sq { border-radius: 18px; }
</style>
</head>
<body>
<div class="banner">
  <div class="glow"></div>
  <div class="mark">
    <svg width="180" height="180" viewBox="0 0 256 256">
      <path d="M100 178 C 100 144 106 124 88 116 L 68 122 C 56 124 50 112 58 104 L 94 78 C 98 62 110 52 124 50 L 132 36 L 146 52 C 172 62 188 94 188 130 C 188 150 184 164 180 178 Z"
            fill="#5681b5" stroke="#5681b5" stroke-width="14" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="106" cy="92" r="9" fill="#161616"/>
      <rect x="62" y="198" width="132" height="18" rx="9" fill="#7fb0dc"/>
    </svg>
  </div>
  <div class="text">
    <h1>jugada</h1>
    <p>your chess world, one menu away.</p>
  </div>
  <div class="board" id="board"></div>
  <script>
    const board = document.getElementById("board");
    for (let r = 0; r < 5; r++) {
      for (let c = 0; c < 5; c++) {
        const s = document.createElement("div");
        s.className = "sq";
        const dark = (r + c) % 2 === 0;
        s.style.background = dark ? "#5681b5" : "#7fb0dc";
        // fade toward the left so the board dissolves into the banner
        const o = Math.max(0.04, (c - 1) * 0.085 + (dark ? 0.06 : 0.02));
        s.style.opacity = o.toFixed(2);
        board.append(s);
      }
    }
  </script>
</div>
</body>
</html>
